<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cow Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <h1>Cow Run</h1>
    <p class="hint"><span class="key">SPACE</span> / <span class="key">TAP</span> jump (x2) · <span class="key">ENTER</span> restart</p>
    <div class="hud">
      <span id="score">Salami: 0</span>
    </div>
    <canvas id="gameCanvas" width="900" height="320" aria-label="Cow endless runner"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
